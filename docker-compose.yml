services:
  logs-monitor:
    build:
      context: .
      network: host
    image: logs-monitor:latest
    container_name: logs-monitor
    ports:
      - "8085:80"
      - "10443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.crt:/etc/nginx/ssl/nginx.crt:ro
      - ./nginx.key:/etc/nginx/ssl/nginx.key:ro
    restart: always

networks:
  default:
    name: global-link
    external: true
